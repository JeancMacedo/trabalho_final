<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Dashboard</title>
  <style>
    :root { --bg:#020617; --card:#0f172a; --text:#e5e7eb; --muted:#94a3b8; --accent:#38bdf8; --accent2:#22c55e; --warn:#f59e0b; }
    * { box-sizing:border-box; }
    body { margin:0; min-height:100vh; display:grid; place-items:center; font-family:Arial, Helvetica, sans-serif; background:radial-gradient(circle at top, #1e293b 0, #020617 50%, #020617 100%); color:var(--text); padding:24px; }
    .card { width:min(100%, 920px); background:rgba(15,23,42,.95); border:1px solid rgba(148,163,184,.18); border-radius:24px; padding:32px; box-shadow:0 24px 80px rgba(0,0,0,.35); }
    .top { display:flex; justify-content:space-between; gap:16px; align-items:flex-start; flex-wrap:wrap; }
    h1 { margin:0 0 8px; font-size:2rem; }
    p { color:var(--muted); line-height:1.5; margin:0; }
    .grid { display:grid; grid-template-columns:repeat(3, minmax(0, 1fr)); gap:16px; margin-top:24px; }
    .panel { background:rgba(17,24,39,.92); border:1px solid rgba(148,163,184,.14); border-radius:18px; padding:18px; }
    .panel h2 { margin:0 0 12px; font-size:1rem; color:#bfdbfe; }
    .value { font-size:1.02rem; word-break:break-word; }
    .actions { display:grid; grid-template-columns:repeat(3, minmax(0, 1fr)); gap:12px; margin-top:24px; }
    button, .linkbtn { border:0; border-radius:12px; padding:14px 16px; font-weight:800; cursor:pointer; text-align:center; text-decoration:none; display:inline-block; }
    .primary { background:linear-gradient(135deg, var(--accent), var(--accent2)); color:#03111f; }
    .secondary { background:#1f2937; color:var(--text); }
    .danger { background:#3f1d1d; color:#fecaca; }
    .output { margin-top:20px; background:#050816; border:1px solid rgba(148,163,184,.14); border-radius:16px; padding:18px; min-height:120px; white-space:pre-wrap; overflow:auto; }
    .output.ok { border-color:rgba(34,197,94,.35); }
    .output.error { border-color:rgba(248,113,113,.35); }
    .badge { display:inline-flex; padding:6px 10px; border-radius:999px; background:rgba(56,189,248,.12); color:#7dd3fc; font-size:.84rem; margin-bottom:12px; }
    code { color:#a7f3d0; }
    @media (max-width: 760px) {
      .grid, .actions { grid-template-columns:1fr; }
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="top">
      <div>
        <div class="badge">Dashboard protegido</div>
        <h1>Fluxo concluído</h1>
        <p>Use os botões abaixo para testar o endpoint protegido e conferir os dados do seu perfil autenticado.</p>
      </div>
      <a class="linkbtn secondary" href="/register">Editar perfil</a>
    </div>

    <section class="grid">
      <article class="panel">
        <h2>Token</h2>
        <div class="value"><code id="token">Carregando...</code></div>
      </article>
      <article class="panel">
        <h2>Perfil</h2>
        <div class="value" id="profile-summary">Carregando...</div>
      </article>
      <article class="panel">
        <h2>Status</h2>
        <div class="value" id="status-text">Autenticando...</div>
      </article>
    </section>

    <section class="actions">
      <button class="primary" id="protected-btn">Testar endpoint protegido</button>
      <button class="secondary" id="profile-btn">Meu perfil</button>
      <button class="danger" id="logout-btn">Sair</button>
    </section>

    <div id="output" class="output">Selecione uma ação para ver a resposta aqui.</div>
  </main>
  <script>
    const token = sessionStorage.getItem('jwtToken');
    const output = document.getElementById('output');
    const tokenBox = document.getElementById('token');
    const profileSummary = document.getElementById('profile-summary');
    const statusText = document.getElementById('status-text');
    const protectedBtn = document.getElementById('protected-btn');
    const profileBtn = document.getElementById('profile-btn');
    const logoutBtn = document.getElementById('logout-btn');

    if (!token) {
      window.location.href = '/';
    }

    tokenBox.textContent = token;

    const storedProfile = sessionStorage.getItem('userProfile');
    if (storedProfile) {
      try {
        const profile = JSON.parse(storedProfile);
        profileSummary.textContent = `${profile.name || 'Sem nome'} • ${profile.email || 'Sem e-mail'} • ${profile.role || 'Sem cargo'}`;
        statusText.textContent = 'Perfil carregado da sessão';
      } catch {
        profileSummary.textContent = 'Perfil salvo, mas não foi possível ler os dados da sessão.';
      }
    } else {
      profileSummary.textContent = 'Clique em “Meu perfil” para carregar os dados do backend.';
      statusText.textContent = 'Aguardando consulta';
    }

    async function requestText(url) {
      const response = await fetch(url, {
        headers: {
          'Authorization': `Bearer ${token}`
        }
      });
      const text = await response.text();
      if (!response.ok) {
        throw new Error(text || 'Falha na requisição');
      }
      return text;
    }

    async function requestJson(url) {
      const response = await fetch(url, {
        headers: {
          'Authorization': `Bearer ${token}`
        }
      });
      const payloadText = await response.text();
      let payload;
      try {
        payload = payloadText ? JSON.parse(payloadText) : {};
      } catch {
        payload = { message: payloadText };
      }
      if (!response.ok) {
        throw new Error(payload.message || payloadText || 'Falha na requisição');
      }
      return payload;
    }

    protectedBtn.addEventListener('click', async () => {
      output.className = 'output';
      output.textContent = 'Chamando endpoint protegido...';
      try {
        const text = await requestText('/api/protected');
        output.className = 'output ok';
        output.textContent = text;
        statusText.textContent = 'Endpoint protegido retornou sucesso';
      } catch (error) {
        output.className = 'output error';
        output.textContent = error.message;
        statusText.textContent = 'Erro ao chamar endpoint protegido';
      }
    });

    profileBtn.addEventListener('click', async () => {
      output.className = 'output';
      output.textContent = 'Carregando perfil...';
      try {
        const profile = await requestJson('/users/me');
        sessionStorage.setItem('userProfile', JSON.stringify(profile));
        profileSummary.textContent = `${profile.name || 'Sem nome'} • ${profile.email || 'Sem e-mail'} • ${profile.role || 'Sem cargo'}`;
        output.className = 'output ok';
        output.textContent = JSON.stringify(profile, null, 2);
        statusText.textContent = 'Perfil carregado do backend';
      } catch (error) {
        output.className = 'output error';
        output.textContent = error.message;
        statusText.textContent = 'Erro ao carregar perfil';
      }
    });

    logoutBtn.addEventListener('click', () => {
      sessionStorage.clear();
      window.location.href = '/';
    });

    profileBtn.click();
  </script>
</body>
</html>

<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Dashboard</title>
  <style>
    body { margin:0; min-height:100vh; display:grid; place-items:center; font-family:Arial, Helvetica, sans-serif; background:#020617; color:#e5e7eb; padding:24px; }
    .card { width:min(100%, 700px); background:#0f172a; border:1px solid rgba(148,163,184,.18); border-radius:18px; padding:32px; }
    h1 { margin-top:0; }
    code { display:block; overflow:auto; padding:16px; background:#111827; border-radius:12px; color:#a7f3d0; }
    a { color:#38bdf8; }
  </style>
</head>
<body>
  <main class="card">
    <h1>Dashboard</h1>
    <p>Autenticação concluída. O token foi salvo na sessão do navegador.</p>
    <p>JWT atual:</p>
    <code id="token"></code>
    <p><a href="/">Solicitar outro código</a></p>
  </main>
  <script>
    document.getElementById('token').textContent = sessionStorage.getItem('jwtToken') || 'Nenhum token encontrado.';
  </script>
</body>
</html>

<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Solicitar código</title>
  <style>
    :root { --bg:#0f172a; --card:#111827; --text:#e5e7eb; --muted:#94a3b8; --accent:#22c55e; --accent2:#38bdf8; }
    * { box-sizing:border-box; }
    body { margin:0; min-height:100vh; font-family:Arial, Helvetica, sans-serif; color:var(--text); background:radial-gradient(circle at top, #1e293b 0, #0f172a 45%, #020617 100%); display:grid; place-items:center; padding:24px; }
    .card { width:min(100%, 520px); background:rgba(17,24,39,.92); border:1px solid rgba(148,163,184,.18); border-radius:20px; padding:32px; box-shadow:0 24px 80px rgba(0,0,0,.35); }
    h1 { margin:0 0 12px; font-size:2rem; }
    p { margin:0 0 24px; color:var(--muted); line-height:1.5; }
    label { display:block; margin:0 0 8px; font-weight:700; }
    input { width:100%; padding:14px 16px; border-radius:12px; border:1px solid rgba(148,163,184,.25); background:#0b1220; color:var(--text); font-size:1rem; }
    button { margin-top:18px; width:100%; padding:14px 16px; border:0; border-radius:12px; background:linear-gradient(135deg, var(--accent), var(--accent2)); color:#03111f; font-weight:800; font-size:1rem; cursor:pointer; }
    button:hover { filter:brightness(1.03); }
  </style>
</head>
<body>
  <main class="card">
    <h1>Solicitar código</h1>
    <p>Informe seu e-mail para receber o código de 6 dígitos e iniciar o fluxo de cadastro.</p>
    <form method="POST" action="/send-code">
      <label for="email">E-mail</label>
      <input id="email" name="email" type="email" placeholder="voce@exemplo.com" required />
      <button type="submit">Enviar código</button>
    </form>
  </main>
</body>
</html>

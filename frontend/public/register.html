<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cadastro de perfil</title>
  <style>
    :root { --bg:#111827; --card:#0b1220; --text:#e5e7eb; --muted:#94a3b8; --accent:#f97316; --accent2:#facc15; --error:#fb7185; }
    * { box-sizing:border-box; }
    body { margin:0; min-height:100vh; font-family:Arial, Helvetica, sans-serif; color:var(--text); background:linear-gradient(160deg, #111827, #1f2937 55%, #020617); display:grid; place-items:center; padding:24px; }
    .card { width:min(100%, 620px); background:rgba(11,18,32,.94); border:1px solid rgba(148,163,184,.18); border-radius:22px; padding:32px; box-shadow:0 24px 80px rgba(0,0,0,.35); }
    h1 { margin:0 0 12px; font-size:2rem; }
    p { margin:0 0 24px; color:var(--muted); line-height:1.5; }
    label { display:block; margin:0 0 8px; font-weight:700; }
    input, select { width:100%; padding:14px 16px; border-radius:12px; border:1px solid rgba(148,163,184,.25); background:#0f172a; color:var(--text); font-size:1rem; }
    button { margin-top:18px; width:100%; padding:14px 16px; border:0; border-radius:12px; background:linear-gradient(135deg, var(--accent), var(--accent2)); color:#1f1300; font-weight:800; font-size:1rem; cursor:pointer; }
    .message { margin-top:16px; min-height:24px; font-size:.96rem; }
    .error { color:var(--error); }
    .success { color:#4ade80; }
    .grid { display:grid; gap:14px; }
    .pill { display:inline-flex; padding:6px 10px; border-radius:999px; background:rgba(56,189,248,.12); color:#7dd3fc; font-size:.88rem; margin-bottom:14px; }
  </style>
</head>
<body>
  <main class="card">
    <div class="pill">Etapa 4</div>
    <h1>Cadastro de nome e cargo</h1>
    <p>O código já foi validado. Agora informe seu nome e escolha o cargo do perfil.</p>
    <form id="register-form">
      <div class="grid">
        <div>
          <label for="email">E-mail autenticado</label>
          <input id="email" name="email" type="email" readonly />
        </div>
        <div>
          <label for="name">Nome</label>
          <input id="name" name="name" type="text" placeholder="Seu nome completo" required />
        </div>
        <div>
          <label for="role">Cargo</label>
          <select id="role" name="role" required>
            <option value="ROLE_CUSTOMER">ROLE_CUSTOMER</option>
            <option value="ROLE_ADMINISTRATOR">ROLE_ADMINISTRATOR</option>
          </select>
        </div>
      </div>
      <button type="submit">Salvar perfil</button>
    </form>
    <div id="message" class="message"></div>
  </main>
  <script>
    const params = new URLSearchParams(window.location.search);
    const emailField = document.getElementById('email');
    const nameField = document.getElementById('name');
    const roleField = document.getElementById('role');
    const message = document.getElementById('message');
    const form = document.getElementById('register-form');
    const token = sessionStorage.getItem('jwtToken');

    if (!token) {
      window.location.href = '/';
    }

    if (params.get('email')) {
      emailField.value = params.get('email');
    }

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      message.textContent = 'Salvando perfil...';
      message.className = 'message';

      try {
        const response = await fetch('/register', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`
          },
          body: JSON.stringify({
            name: nameField.value,
            role: roleField.value
          })
        });

        const payload = await response.json().catch(() => ({}));

        if (!response.ok) {
          message.textContent = payload.message || 'Falha ao salvar o perfil.';
          message.className = 'message error';
          return;
        }

        sessionStorage.setItem('userProfile', JSON.stringify(payload));
        sessionStorage.setItem('userName', payload.name || nameField.value);
        sessionStorage.setItem('userRole', payload.role || roleField.value);
        message.textContent = 'Perfil salvo. Redirecionando para o dashboard...';
        message.className = 'message success';
        window.location.href = '/dashboard';
      } catch (error) {
        message.textContent = 'Falha ao salvar o perfil.';
        message.className = 'message error';
      }
    });
  </script>
</body>
</html>
